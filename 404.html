<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>Página no encontrada | Luis G. Analysis</title>
  <style>
    :root { --bg:#0b0f17; --text:#f5f7fb; --muted:#a8b3c7; --line:rgba(255,255,255,.12); --accent:#d4af37; }
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
    main { width:min(100% - 40px, 720px); border:1px solid var(--line); border-radius:24px; padding:36px; background:rgba(255,255,255,.045); }
    h1 { font-size:clamp(2.3rem,7vw,4.5rem); line-height:.95; letter-spacing:-.06em; margin:0 0 18px; }
    p { color:var(--muted); }
    a { display:inline-flex; margin-top:18px; color:#111; background:var(--accent); border-radius:999px; padding:12px 18px; text-decoration:none; font-weight:800; }
  </style>
</head>
<body>
  <main>
    <h1>Página no encontrada</h1>
    <p>El contenido que buscas no está disponible o todavía no ha sido publicado dentro de Luis G. Analysis.</p>

</body>
